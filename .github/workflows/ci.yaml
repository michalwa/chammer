name: CI
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: clang --version
    - run: make test
      env:
        CFLAGS: -Werror

  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: clang-format --version
    - run: make format-check
